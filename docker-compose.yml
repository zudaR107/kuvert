# One-time setup, before first `docker compose up`:
#   docker network create schloss-net
# schlussel runs from its own repo (see schlussel/docker-compose.yml) and
# must be on the same network for kuvert-api to reach it by hostname.
services:
  kuvert-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_PATH: /data/kuvert.db
      SCHLUSSEL_JWKS_URL: ${SCHLUSSEL_JWKS_URL:-http://schlussel:4000/.well-known/jwks.json}
      # Must match schlussel's own JWT_ISSUER (hardcoded to "schlussel" in
      # schlussel/docker-compose.yml) — this default previously said
      # "schloss", which silently broke every cross-service token check
      # unless JWT_ISSUER was overridden by hand.
      JWT_ISSUER: ${JWT_ISSUER:-schlussel}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    volumes:
      - kuvert-data:/data
    networks:
      - schloss-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  kuvert-web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_SCHLUSSEL_URL: ${SCHLUSSEL_WEB_URL:-http://localhost:4001}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3002}:80"
    networks:
      - schloss-net
    depends_on:
      - kuvert-api

volumes:
  kuvert-data:

networks:
  schloss-net:
    external: true
